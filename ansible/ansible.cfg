[defaults]
# Disable host key checking — safe for lab environments.
# In production, use a known_hosts file and set this to True.
host_key_checking = False

# SSH connection timeout in seconds
timeout = 60

# Do not create .retry files on failure
retry_files_enabled = False

# Show task results as they run
stdout_callback = yaml

# Increase parallelism — default is 5. Raise for larger fleets.
forks = 10

[ssh_connection]
# Keep SSH connections alive across tasks (faster for multiple tasks per host)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Pipelining reduces SSH round-trips — significant speedup at scale
pipelining = True
